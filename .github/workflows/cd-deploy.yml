# ===========================================
# Clenzy — CD Deploy (Déploiement complet VPS)
# ===========================================
# Workflow pour déployer l'ensemble de l'infrastructure sur le VPS OVH.
# Déclenché :
#   - Automatiquement quand on push/merge sur la branche 'production'
#   - Manuellement via workflow_dispatch
#   - À distance via repository_dispatch (depuis les repos applicatifs)
# Note: trigger via push requires matching one of the configured paths below.
# Note: updating GitHub environment secrets/variables does not trigger this workflow automatically.

name: CD Deploy

on:
  push:
    branches: [production]
    paths:
      - 'docker-compose.prod.yml'
      - 'nginx/**'
      - 'monitoring/**'
      - 'keycloak/**'
      - '.github/workflows/cd-deploy.yml'
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: 'Mode de déploiement'
        required: true
        default: 'update'
        type: choice
        options:
          - update
          - full-rebuild
      force_env_sync:
        description: 'Forcer la synchronisation du .env depuis le secret PROD_ENV_FILE_B64 (recommandé si changement de secrets)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      services:
        description: 'Services à déployer (vide = tous)'
        required: false
        default: ''
        type: string
  repository_dispatch:
    types:
      - deploy-landingpage
      - deploy-clenzy-frontend
      - deploy-clenzy-backend
      - deploy-service

permissions:
  contents: read
jobs:
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST != '' && secrets.VPS_HOST || vars.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER != '' && secrets.VPS_USER || vars.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
      PROD_ENV_FILE_B64: ${{ secrets.PROD_ENV_FILE_B64 }}
      VPS_INFRA_DIR: ${{ vars.VPS_INFRA_DIR }}

    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v4

      - name: Validate required deployment secrets
        run: |
          set -e
          missing=0

          for key in VPS_HOST VPS_USER; do
            if [ -z "${!key}" ]; then
              echo "❌ Valeur manquante: $key (secret OU variable, repo/environnement production)"
              missing=1
            fi
          done

          for key in VPS_SSH_KEY GHCR_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "❌ Secret manquant: $key (repo/environnement production)"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "Configurer les secrets GitHub Actions puis relancer le workflow."
            exit 1
          fi

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            echo "=========================================="
            echo "🚀 Clenzy — Deploiement Infrastructure"
            echo "=========================================="
            echo ""

            INFRA_DIR="${{ env.VPS_INFRA_DIR }}"
            if [ -z "$INFRA_DIR" ]; then
              INFRA_DIR="$HOME/clenzy-infra"
            fi
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ ! -d "$INFRA_DIR/.git" ]; then
              echo "📁 Dossier infra absent, bootstrap du repo..."
              mkdir -p "$(dirname "$INFRA_DIR")"
              git clone "$REPO_URL" "$INFRA_DIR"
            fi

            cd "$INFRA_DIR"

            # --- Authentification GHCR ---
            echo "🔐 Connexion au GitHub Container Registry..."
            echo "${{ env.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # --- Mise à jour du repo infra ---
            echo "📥 Mise à jour du repo infrastructure..."
            git fetch origin production
            git reset --hard origin/production

            # --- Provisioning .env ---
            FORCE_ENV_SYNC="${{ github.event.client_payload.force_env_sync || github.event.inputs.force_env_sync || 'false' }}"
            if [ "$FORCE_ENV_SYNC" = "true" ]; then
              if [ -z "${{ env.PROD_ENV_FILE_B64 }}" ]; then
                echo "❌ FORCE_ENV_SYNC=true mais secret PROD_ENV_FILE_B64 absent."
                exit 1
              fi
              if [ -f ".env" ]; then
                ts="$(date +%Y%m%d-%H%M%S)"
                cp -f .env ".env.bak.${ts}"
                chmod 600 ".env.bak.${ts}" || true
                echo "💾 Backup .env -> .env.bak.${ts}"
              fi
              echo "📝 Synchronisation forcée de .env depuis secret PROD_ENV_FILE_B64..."
              umask 077
              printf '%s' "${{ env.PROD_ENV_FILE_B64 }}" | base64 -d > .env
              chmod 600 .env
            else
              if [ ! -f ".env" ]; then
                if [ -n "${{ env.PROD_ENV_FILE_B64 }}" ]; then
                  echo "📝 Création de .env depuis secret PROD_ENV_FILE_B64..."
                  umask 077
                  printf '%s' "${{ env.PROD_ENV_FILE_B64 }}" | base64 -d > .env
                else
                  echo "❌ Fichier .env absent sur le VPS et aucun secret de bootstrap trouvé."
                  echo "   Ajouter PROD_ENV_FILE_B64 dans l'environnement GitHub 'production'."
                  exit 1
                fi
                chmod 600 .env
              fi
            fi

            # Charge les variables .env dans le shell distant.
            set -a
            . ./.env
            set +a

            # --- Bootstrap DB Keycloak ---
            KEYCLOAK_DB_NAME="${KEYCLOAK_DB_NAME:-keycloak_prod}"
            KEYCLOAK_DB_USER="${KEYCLOAK_DB_USER:-${POSTGRES_USER}}"
            KEYCLOAK_DB_PASSWORD="${KEYCLOAK_DB_PASSWORD:-${POSTGRES_PASSWORD:-}}"
            if [ -z "$KEYCLOAK_DB_PASSWORD" ]; then
              echo "❌ KEYCLOAK_DB_PASSWORD/POSTGRES_PASSWORD manquant dans .env."
              exit 1
            fi
            KEYCLOAK_DB_NAME_LIT=$(printf '%s' "${KEYCLOAK_DB_NAME}" | sed "s/'/''/g")
            KEYCLOAK_DB_NAME_IDENT=$(printf '%s' "${KEYCLOAK_DB_NAME}" | sed 's/"/""/g')
            KEYCLOAK_DB_USER_LIT=$(printf '%s' "${KEYCLOAK_DB_USER}" | sed "s/'/''/g")
            KEYCLOAK_DB_USER_IDENT=$(printf '%s' "${KEYCLOAK_DB_USER}" | sed 's/"/""/g')
            KEYCLOAK_DB_PASSWORD_LIT=$(printf '%s' "${KEYCLOAK_DB_PASSWORD}" | sed "s/'/''/g")
            echo "🗄️  Vérification base Keycloak (${KEYCLOAK_DB_NAME})..."
            docker compose -f docker-compose.prod.yml --env-file .env up -d postgres

            ATTEMPTS=0
            until docker compose -f docker-compose.prod.yml --env-file .env exec -T postgres \
              pg_isready -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" >/dev/null 2>&1; do
              ATTEMPTS=$((ATTEMPTS + 1))
              if [ "$ATTEMPTS" -ge 30 ]; then
                echo "❌ PostgreSQL non prêt après attente."
                exit 1
              fi
              sleep 2
            done

            echo "👤 Synchronisation du rôle DB Keycloak (${KEYCLOAK_DB_USER})..."
            ROLE_EXISTS=$(docker compose -f docker-compose.prod.yml --env-file .env exec -T postgres \
              psql -U "${POSTGRES_USER}" -d postgres -tAc \
              "SELECT 1 FROM pg_roles WHERE rolname='${KEYCLOAK_DB_USER_LIT}'")
            if [ "$ROLE_EXISTS" = "1" ]; then
              docker compose -f docker-compose.prod.yml --env-file .env exec -T postgres \
                psql -U "${POSTGRES_USER}" -d postgres -v ON_ERROR_STOP=1 \
                -c "ALTER ROLE \"${KEYCLOAK_DB_USER_IDENT}\" WITH LOGIN PASSWORD '${KEYCLOAK_DB_PASSWORD_LIT}';"
            else
              docker compose -f docker-compose.prod.yml --env-file .env exec -T postgres \
                psql -U "${POSTGRES_USER}" -d postgres -v ON_ERROR_STOP=1 \
                -c "CREATE ROLE \"${KEYCLOAK_DB_USER_IDENT}\" LOGIN PASSWORD '${KEYCLOAK_DB_PASSWORD_LIT}';"
            fi

            DB_EXISTS=$(docker compose -f docker-compose.prod.yml --env-file .env exec -T postgres \
              psql -U "${POSTGRES_USER}" -d postgres -tAc \
              "SELECT 1 FROM pg_database WHERE datname='${KEYCLOAK_DB_NAME_LIT}'")
            if [ "$DB_EXISTS" != "1" ]; then
              echo "➕ Création de la base ${KEYCLOAK_DB_NAME}..."
              docker compose -f docker-compose.prod.yml --env-file .env exec -T postgres \
                psql -U "${POSTGRES_USER}" -d postgres -v ON_ERROR_STOP=1 \
                -c "CREATE DATABASE \"${KEYCLOAK_DB_NAME_IDENT}\" OWNER \"${KEYCLOAK_DB_USER_IDENT}\";"
            fi

            docker compose -f docker-compose.prod.yml --env-file .env exec -T postgres \
              psql -U "${POSTGRES_USER}" -d postgres -v ON_ERROR_STOP=1 \
              -c "GRANT ALL PRIVILEGES ON DATABASE \"${KEYCLOAK_DB_NAME_IDENT}\" TO \"${KEYCLOAK_DB_USER_IDENT}\";"

            AUTH_OK=$(docker compose -f docker-compose.prod.yml --env-file .env exec -T \
              -e PGPASSWORD="${KEYCLOAK_DB_PASSWORD}" postgres \
              psql -h localhost -U "${KEYCLOAK_DB_USER}" -d "${KEYCLOAK_DB_NAME}" -tAc "SELECT 1" 2>/dev/null || true)
            if [ "$AUTH_OK" != "1" ]; then
              echo "❌ Auth DB Keycloak invalide (${KEYCLOAK_DB_USER}@${KEYCLOAK_DB_NAME})."
              exit 1
            fi

            # --- Backup avant déploiement ---
            echo "💾 Backup pré-déploiement..."
            if [ -f "./backup/backup.sh" ]; then
              bash ./backup/backup.sh --env prod --db-only 2>/dev/null || echo "⚠️  Backup ignoré (base non disponible)"
            fi

            DEPLOY_MODE="${{ github.event.client_payload.deploy_mode || github.event.inputs.deploy_mode || 'update' }}"
            SERVICES="${{ github.event.client_payload.services || github.event.client_payload.service || github.event.inputs.services || '' }}"
            SERVICES_LIST=$(echo "$SERVICES" | tr ',' ' ')

            if [ "$DEPLOY_MODE" = "full-rebuild" ]; then
              echo "🔄 Rebuild complet de tous les services..."
              docker compose -f docker-compose.prod.yml --env-file .env pull
              docker compose -f docker-compose.prod.yml --env-file .env up -d --force-recreate
              HEALTH_SERVICES="nginx pms-server pms-client landing postgres redis keycloak kafka"
            else
              if [ -n "$SERVICES_LIST" ]; then
                echo "📦 Mise à jour des services : $SERVICES_LIST"
                docker compose -f docker-compose.prod.yml --env-file .env pull $SERVICES_LIST
                docker compose -f docker-compose.prod.yml --env-file .env up -d $SERVICES_LIST
                HEALTH_SERVICES="$SERVICES_LIST"
              else
                echo "📦 Mise à jour de tous les services..."
                docker compose -f docker-compose.prod.yml --env-file .env pull
                docker compose -f docker-compose.prod.yml --env-file .env up -d
                HEALTH_SERVICES="nginx pms-server pms-client landing postgres redis keycloak kafka"
              fi
            fi

            # --- Nettoyage ---
            echo "🧹 Nettoyage des anciennes images..."
            docker image prune -f

            # Recharge/recrée Nginx pour appliquer les templates envsubst
            # (sinon Nginx peut garder une ancienne resolution d'upstream).
            echo "♻️  Recréation de Nginx pour recharger la configuration..."
            docker compose -f docker-compose.prod.yml --env-file .env up -d --no-deps --force-recreate nginx

            # --- Vérification santé ---
            echo ""
            echo "⏳ Attente du démarrage des services (30s)..."
            sleep 30

            echo ""
            echo "📊 État des services :"
            docker compose -f docker-compose.prod.yml ps

            # --- Healthcheck ---
            echo ""
            echo "🏥 Vérification de santé :"

            # Vérifier que les conteneurs critiques sont running
            FAILED=0
            for SERVICE in $HEALTH_SERVICES; do
              STATUS=$(docker compose -f docker-compose.prod.yml ps --format '{{.State}}' $SERVICE 2>/dev/null || echo "not found")
              if [ "$STATUS" = "running" ]; then
                echo "   ✅ $SERVICE : running"
              else
                echo "   ❌ $SERVICE : $STATUS"
                FAILED=1
              fi
            done

            if echo " $HEALTH_SERVICES " | grep -q " keycloak "; then
              echo "🔎 Vérification readiness HTTP de Keycloak..."
              KEYCLOAK_READY=0
              for _ in $(seq 1 30); do
                READY_PAYLOAD=$(docker compose -f docker-compose.prod.yml --env-file .env exec -T nginx \
                  sh -lc "wget -qO- http://clenzy-keycloak:8080/health/ready" 2>/dev/null || true)
                if echo "$READY_PAYLOAD" | grep -q '"status"[[:space:]]*:[[:space:]]*"UP"'; then
                  KEYCLOAK_READY=1
                  break
                fi
                sleep 2
              done
              if [ "$KEYCLOAK_READY" -eq 1 ]; then
                echo "   ✅ keycloak readiness HTTP: UP"
              else
                echo "   ❌ keycloak readiness HTTP: KO"
                docker compose -f docker-compose.prod.yml --env-file .env logs --tail=120 keycloak || true
                FAILED=1
              fi
            fi

            echo ""
            if [ $FAILED -eq 1 ]; then
              echo "⚠️  Certains services ne sont pas en bonne santé !"
              echo "   Vérifiez les logs : docker compose -f docker-compose.prod.yml logs"
              exit 1
            else
              echo "✅ Tous les services sont opérationnels !"
              echo ""
              echo "🌐 Services accessibles :"
              echo "   - Landing   : https://clenzy.fr"
              echo "   - PMS       : https://app.clenzy.fr"
              echo "   - API       : https://app.clenzy.fr/api"
              echo "   - Auth      : https://auth.clenzy.fr"
            fi
