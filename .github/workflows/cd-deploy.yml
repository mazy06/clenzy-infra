# ===========================================
# Clenzy — CD Deploy (Deploiement complet VPS)
# ===========================================
# Workflow pour deployer l'ensemble de l'infrastructure sur le VPS OVH.
# Declenche :
#   - Automatiquement quand on push/merge sur la branche 'production'
#   - Manuellement via workflow_dispatch
#   - A distance via repository_dispatch (depuis les repos applicatifs)
# Note: trigger via push requires matching one of the configured paths below.
# Note: updating GitHub environment secrets/variables does not trigger this workflow automatically.
#
# La logique de deploiement est dans scripts/deploy.sh.
# Ce workflow ne fait que : bootstrap repo, .env, GHCR auth, puis appelle le script.

name: CD Deploy

on:
  push:
    branches: [production]
    paths:
      - 'docker-compose.prod.yml'
      - 'nginx/**'
      - 'monitoring/**'
      - 'keycloak/**'
      - 'postgres/**'
      - 'pgbouncer/**'
      - 'scripts/**'
      - '.github/workflows/cd-deploy.yml'
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: 'Mode de deploiement'
        required: true
        default: 'update'
        type: choice
        options:
          - update
          - full-rebuild
      force_env_sync:
        description: 'Forcer la synchronisation du .env depuis le secret PROD_ENV_FILE_B64'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      services:
        description: 'Services a deployer (vide = tous)'
        required: false
        default: ''
        type: string
  repository_dispatch:
    types:
      - deploy-landingpage
      - deploy-clenzy-frontend
      - deploy-clenzy-backend
      - deploy-service

permissions:
  contents: read
jobs:
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v4

      - name: Validate required deployment secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST != '' && secrets.VPS_HOST || vars.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER != '' && secrets.VPS_USER || vars.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -e
          missing=0
          for key in VPS_HOST VPS_USER; do
            if [ -z "${!key}" ]; then
              echo "❌ Valeur manquante: $key (secret OU variable, repo/environnement production)"
              missing=1
            fi
          done
          for key in VPS_SSH_KEY GHCR_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "❌ Secret manquant: $key (repo/environnement production)"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Configurer les secrets GitHub Actions puis relancer le workflow."
            exit 1
          fi

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_INFRA_DIR: ${{ vars.VPS_INFRA_DIR }}
          DEPLOY_REPO: ${{ github.repository }}
          DEPLOY_GHCR_OWNER: ${{ github.repository_owner }}
          DEPLOY_GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_ENV_B64: ${{ secrets.PROD_ENV_FILE_B64 }}
          DEPLOY_FORCE_ENV: ${{ github.event.client_payload.force_env_sync || github.event.inputs.force_env_sync || 'false' }}
          DEPLOY_MODE: ${{ github.event.client_payload.deploy_mode || github.event.inputs.deploy_mode || 'update' }}
          DEPLOY_SERVICES: ${{ github.event.client_payload.services || github.event.client_payload.service || github.event.inputs.services || '' }}
        with:
          host: ${{ secrets.VPS_HOST != '' && secrets.VPS_HOST || vars.VPS_HOST }}
          username: ${{ secrets.VPS_USER != '' && secrets.VPS_USER || vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: DEPLOY_INFRA_DIR,DEPLOY_REPO,DEPLOY_GHCR_OWNER,DEPLOY_GHCR_TOKEN,DEPLOY_ENV_B64,DEPLOY_FORCE_ENV,DEPLOY_MODE,DEPLOY_SERVICES
          command_timeout: 30m
          script: |
            set -e
            echo "=========================================="
            echo "🚀 Clenzy — Deploiement Infrastructure"
            echo "=========================================="

            INFRA_DIR="${DEPLOY_INFRA_DIR:-$HOME/clenzy-infra}"
            REPO_URL="https://github.com/${DEPLOY_REPO}.git"

            if [ ! -d "$INFRA_DIR/.git" ]; then
              echo "📁 Dossier infra absent, bootstrap du repo..."
              mkdir -p "$(dirname "$INFRA_DIR")"
              git clone "$REPO_URL" "$INFRA_DIR"
            fi

            cd "$INFRA_DIR"

            echo "🔐 Connexion au GitHub Container Registry..."
            echo "$DEPLOY_GHCR_TOKEN" | docker login ghcr.io -u "$DEPLOY_GHCR_OWNER" --password-stdin

            echo "📥 Mise a jour du repo infrastructure..."
            git fetch origin production
            git reset --hard origin/production

            # --- Provisioning .env ---
            if [ "$DEPLOY_FORCE_ENV" = "true" ]; then
              if [ -z "$DEPLOY_ENV_B64" ]; then
                echo "❌ FORCE_ENV_SYNC=true mais secret PROD_ENV_FILE_B64 absent."
                exit 1
              fi
              if [ -f ".env" ]; then
                ts="$(date +%Y%m%d-%H%M%S)"
                cp -f .env ".env.bak.${ts}"
                chmod 600 ".env.bak.${ts}" || true
                echo "💾 Backup .env -> .env.bak.${ts}"
              fi
              echo "📝 Synchronisation forcee de .env..."
              umask 077
              printf '%s' "$DEPLOY_ENV_B64" | base64 -d > .env
              chmod 600 .env
            else
              if [ ! -f ".env" ]; then
                if [ -n "$DEPLOY_ENV_B64" ]; then
                  echo "📝 Creation de .env depuis secret..."
                  umask 077
                  printf '%s' "$DEPLOY_ENV_B64" | base64 -d > .env
                else
                  echo "❌ Fichier .env absent et aucun secret de bootstrap."
                  exit 1
                fi
                chmod 600 .env
              fi
            fi

            # Charger .env puis lancer le script de deploiement
            set -a; . ./.env; set +a
            export DEPLOY_MODE DEPLOY_SERVICES
            chmod +x scripts/deploy.sh
            bash scripts/deploy.sh
