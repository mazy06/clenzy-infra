name: Keycloak Sync Clients

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync Keycloak Clients
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Sync Keycloak clients on VPS
        uses: appleboy/ssh-action@v1
        env:
          SSH_HOST: ${{ secrets.VPS_HOST != '' && secrets.VPS_HOST || vars.VPS_HOST }}
          SSH_USER: ${{ secrets.VPS_USER != '' && secrets.VPS_USER || vars.VPS_USER }}
          INFRA_DIR_VALUE: ${{ vars.VPS_INFRA_DIR }}
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: INFRA_DIR_VALUE
          script: |
            set -e
            INFRA_DIR="${INFRA_DIR_VALUE}"
            if [ -z "$INFRA_DIR" ]; then
              INFRA_DIR="$HOME/clenzy-infra"
            fi
            cd "$INFRA_DIR"
            git fetch origin production
            git reset --hard origin/production
            chmod +x keycloak/sync-clients.sh
            bash keycloak/sync-clients.sh
