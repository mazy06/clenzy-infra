; ===========================================
; PgBouncer - Connection Pooling for Clenzy
; ===========================================
; Niveau 8 — Scalabilite : connection pooling devant PostgreSQL
; Reduit le nombre de connexions directes a PostgreSQL et
; ameliore la latence des requetes courtes.

[databases]
; Base primaire (lecture/ecriture)
clenzy_prod = host=postgres port=5432 dbname=clenzy_prod
clenzy_dev  = host=postgres port=5432 dbname=clenzy_dev

; Base replica (lecture seule) — active uniquement si le replica existe
; clenzy_prod_ro = host=postgres-replica port=5432 dbname=clenzy_prod

; Keycloak (direct, pas de pooling avance)
keycloak_prod = host=postgres port=5432 dbname=keycloak_prod
keycloak_dev  = host=postgres port=5432 dbname=keycloak_dev

[pgbouncer]
; --- Connexion pool ---
listen_addr = 0.0.0.0
listen_port = 6432

; Mode transaction : connexion liberee apres chaque transaction
; Meilleur ratio connexions/performance pour Spring Boot + JPA
pool_mode = transaction

; --- Limites ---
max_client_conn = 200
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; --- Auth ---
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; --- Logging ---
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; --- Timeouts ---
server_connect_timeout = 15
server_idle_timeout = 600
server_lifetime = 3600
client_idle_timeout = 0
client_login_timeout = 60
query_timeout = 0
query_wait_timeout = 120

; --- Administration ---
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats

; --- Performance ---
tcp_keepalive = 1
tcp_keepidle = 30
tcp_keepintvl = 10
tcp_keepcnt = 3
