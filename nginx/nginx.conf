user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Security headers (globaux)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # ==========================================
    # Upstreams
    # ==========================================
    upstream landing {
        server clenzy-landing:80;
        keepalive 16;
    }

    upstream pms_frontend {
        server clenzy-frontend:80;
        keepalive 32;
    }

    upstream pms_backend {
        server clenzy-server:8080;
        keepalive 32;
    }

    upstream keycloak {
        server clenzy-keycloak:8080;
        keepalive 16;
    }

    # ==========================================
    # HTTP → HTTPS redirect (tous les domaines)
    # + ACME challenge Let's Encrypt
    # ==========================================
    server {
        listen 80;
        server_name clenzy.com www.clenzy.com app.clenzy.com auth.clenzy.com;

        # Let's Encrypt ACME challenge (doit rester accessible en HTTP)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Tout le reste → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==========================================
    # LANDING PAGE — clenzy.com / www.clenzy.com
    # ==========================================
    server {
        listen 443 ssl http2;
        server_name clenzy.com www.clenzy.com;

        # SSL — Let's Encrypt (prod) ou auto-signe (dev)
        # Utiliser le script init-letsencrypt.sh pour generer les certificats Let's Encrypt
        ssl_certificate /etc/letsencrypt/live/clenzy.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/clenzy.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Landing page
        location / {
            limit_req zone=general burst=50 nodelay;

            proxy_pass http://landing;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache assets statiques
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://landing;
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Sécurité : bloquer les fichiers sensibles
        location ~ /\. { deny all; }
        location ~ \.(env|log|sql|bak)$ { deny all; }
    }

    # ==========================================
    # PMS APP — app.clenzy.com
    # ==========================================
    server {
        listen 443 ssl http2;
        server_name app.clenzy.com;

        # SSL
        ssl_certificate /etc/letsencrypt/live/clenzy.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/clenzy.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # API Backend (Spring Boot)
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://pms_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;
        }

        # Frontend React (PMS)
        location / {
            proxy_pass http://pms_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache assets statiques
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://pms_frontend;
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Sécurité
        location ~ /\. { deny all; }
        location ~ \.(env|log|sql|bak)$ { deny all; }
    }

    # ==========================================
    # KEYCLOAK AUTH — auth.clenzy.com
    # ==========================================
    server {
        listen 443 ssl http2;
        server_name auth.clenzy.com;

        # SSL
        ssl_certificate /etc/letsencrypt/live/clenzy.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/clenzy.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Keycloak
        location / {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://keycloak;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (admin console)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts plus longs pour Keycloak
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Sécurité
        location ~ /\. { deny all; }
    }
}
