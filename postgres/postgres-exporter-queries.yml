# ===========================================
# PostgreSQL Exporter - Custom Queries
# ===========================================
# Niveau 8 — Scalabilite : metriques detaillees PostgreSQL
# pour Prometheus/Grafana.

pg_replication:
  query: |
    SELECT
      CASE WHEN pg_is_in_recovery() THEN 1 ELSE 0 END AS is_replica,
      COALESCE(EXTRACT(EPOCH FROM (now() - pg_last_xact_replay_timestamp())), 0) AS lag_seconds
  master: true
  metrics:
    - is_replica:
        usage: "GAUGE"
        description: "1 if this server is a replica, 0 if primary"
    - lag_seconds:
        usage: "GAUGE"
        description: "Replication lag in seconds (0 on primary)"

pg_database_size:
  query: |
    SELECT datname, pg_database_size(datname) AS size_bytes
    FROM pg_database
    WHERE datname NOT IN ('template0', 'template1')
  master: true
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - size_bytes:
        usage: "GAUGE"
        description: "Database size in bytes"

pg_stat_activity_count:
  query: |
    SELECT state, COUNT(*) AS count
    FROM pg_stat_activity
    WHERE datname IS NOT NULL
    GROUP BY state
  master: true
  metrics:
    - state:
        usage: "LABEL"
        description: "Connection state"
    - count:
        usage: "GAUGE"
        description: "Number of connections in this state"

pg_locks:
  query: |
    SELECT mode, COUNT(*) AS count
    FROM pg_locks
    GROUP BY mode
  master: true
  metrics:
    - mode:
        usage: "LABEL"
        description: "Lock mode"
    - count:
        usage: "GAUGE"
        description: "Number of locks in this mode"

pg_stat_user_tables:
  query: |
    SELECT
      schemaname,
      relname,
      seq_scan,
      seq_tup_read,
      idx_scan,
      idx_tup_fetch,
      n_tup_ins,
      n_tup_upd,
      n_tup_del,
      n_dead_tup,
      last_autovacuum,
      last_autoanalyze
    FROM pg_stat_user_tables
    WHERE schemaname = 'public'
    ORDER BY seq_scan DESC
    LIMIT 30
  master: true
  metrics:
    - schemaname:
        usage: "LABEL"
        description: "Schema name"
    - relname:
        usage: "LABEL"
        description: "Table name"
    - seq_scan:
        usage: "COUNTER"
        description: "Sequential scans"
    - seq_tup_read:
        usage: "COUNTER"
        description: "Tuples read by sequential scans"
    - idx_scan:
        usage: "COUNTER"
        description: "Index scans"
    - idx_tup_fetch:
        usage: "COUNTER"
        description: "Tuples fetched by index scans"
    - n_tup_ins:
        usage: "COUNTER"
        description: "Tuples inserted"
    - n_tup_upd:
        usage: "COUNTER"
        description: "Tuples updated"
    - n_tup_del:
        usage: "COUNTER"
        description: "Tuples deleted"
    - n_dead_tup:
        usage: "GAUGE"
        description: "Dead tuples (need vacuum)"
