# ===========================================
# PostgreSQL Primary - Configuration Replication
# ===========================================
# Niveau 8 — Scalabilite : parametres WAL pour streaming replication.
# Ces valeurs sont incluses via postgresql.conf sur le primary.

# --- WAL / Replication ---
wal_level = replica
max_wal_senders = 5
wal_keep_size = 256MB
hot_standby = on

# --- Connexions ---
# pgBouncer pool=25 x N instances + Keycloak(20) + exporter(1) + admin(5)
# Pour 3 instances pms-server : 75 + 26 = 101, marge a 200
max_connections = 200
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 4MB
maintenance_work_mem = 128MB

# --- WAL archiving (optionnel, pour PITR) ---
# archive_mode = on
# archive_command = 'cp %p /var/lib/postgresql/archive/%f'

# --- Performance ---
checkpoint_completion_target = 0.9
random_page_cost = 1.1
effective_io_concurrency = 200

# --- Logging ---
log_min_duration_statement = 500
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
