# ===========================================
# PostgreSQL HBA - Standard + Replication Access
# ===========================================
# Niveau 8 — Scalabilite : pg_hba.conf complet incluant les regles
# standard plus l'acces de streaming replication pour le replica.

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# "local" is for Unix domain socket connections only
local   all             all                                     trust

# IPv4 local connections (Docker network)
host    all             all             0.0.0.0/0               md5

# IPv6 local connections
host    all             all             ::0/0                   md5

# Replication connections from replica(s) on the Docker network
host    replication     replicator      0.0.0.0/0               md5
