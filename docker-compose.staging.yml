version: '3.8'

# ===========================================
# Clenzy - Docker Compose STAGING
# ===========================================
# Usage: docker compose -f docker-compose.staging.yml --env-file .env.staging up -d
#
# Architecture (miroir de la production) :
#   - Landing Page   → staging.clenzy.fr
#   - PMS Frontend   → app.staging.clenzy.fr
#   - PMS API        → app.staging.clenzy.fr/api
#   - Keycloak       → auth.staging.clenzy.fr
#   - Prometheus     → localhost:9090 (interne)
#   - Grafana        → monitoring.staging.clenzy.fr

services:

  # ==========================================
  # REVERSE PROXY NGINX
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: clenzy-nginx-staging
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      APP_DOMAIN: ${APP_DOMAIN}
      AUTH_DOMAIN: ${AUTH_DOMAIN}
      CERTBOT_CERT_NAME: ${CERTBOT_CERT_NAME:-${DOMAIN}}
      NGINX_ENVSUBST_FILTER: ^(DOMAIN|APP_DOMAIN|AUTH_DOMAIN|CERTBOT_CERT_NAME)$
      NGINX_ENVSUBST_TEMPLATE_DIR: /etc/nginx/templates
      NGINX_ENVSUBST_TEMPLATE_SUFFIX: .template
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot-staging:/var/www/certbot:ro
      - certbot-certs-staging:/etc/letsencrypt:ro
    depends_on:
      - landing
      - pms-client
      - pms-server
      - keycloak
    networks:
      - clenzy-network-staging

  # ==========================================
  # CERTBOT (Let's Encrypt SSL)
  # ==========================================
  certbot:
    image: certbot/certbot:latest
    container_name: clenzy-certbot-staging
    volumes:
      - certbot-webroot-staging:/var/www/certbot
      - certbot-certs-staging:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - clenzy-network-staging

  # ==========================================
  # LANDING PAGE
  # ==========================================
  landing:
    build:
      context: ../clenzy-landingpage
      dockerfile: Dockerfile
      args:
        VITE_APP_URL: https://${APP_DOMAIN}
    container_name: clenzy-landing-staging
    restart: unless-stopped
    expose:
      - "80"
    networks:
      clenzy-network-staging:
        aliases:
          - clenzy-landing

  # ==========================================
  # INFRASTRUCTURE (BDD, Cache, Auth)
  # ==========================================

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: clenzy-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres-data-staging:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clenzy-network-staging

  # Redis
  redis:
    image: redis:7-alpine
    container_name: clenzy-redis-staging
    restart: unless-stopped
    volumes:
      - redis-data-staging:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clenzy-network-staging

  # Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: clenzy-keycloak-staging
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_staging
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: ${AUTH_DOMAIN}
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./keycloak/realm-clenzy.json:/opt/keycloak/data/import/realm-clenzy.json
    expose:
      - "8080"
    command: start --import-realm
    networks:
      clenzy-network-staging:
        aliases:
          - clenzy-keycloak

  # ==========================================
  # MESSAGE BROKER (Kafka + KRaft)
  # ==========================================

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: clenzy-kafka-staging
    hostname: clenzy-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@clenzy-kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://clenzy-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # KRaft cluster id — OBLIGATOIRE, doit être un UUID base64 valide (22 chars).
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:?KAFKA_CLUSTER_ID manquant dans .env — voir .env.example}
    volumes:
      - kafka-data-staging:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - clenzy-network-staging

  # ==========================================
  # LIBREOFFICE (Conversion ODT -> PDF)
  # ==========================================

  libreoffice:
    image: gotenberg/gotenberg:8
    container_name: clenzy-libreoffice-staging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      clenzy-network-staging:
        aliases:
          - clenzy-libreoffice

  # ==========================================
  # PMS (Application métier)
  # ==========================================

  # Backend Spring Boot
  pms-server:
    build:
      context: ../clenzy/server
      dockerfile: Dockerfile
    container_name: clenzy-server-staging
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?sslmode=prefer
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: https://${AUTH_DOMAIN}/realms/clenzy
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://clenzy-keycloak:8080/realms/clenzy/protocol/openid-connect/certs
      KEYCLOAK_AUTH_SERVER_URL: http://clenzy-keycloak:8080
      KEYCLOAK_CLIENT_ID: clenzy-api
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_REALM: clenzy
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST:-redis}
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: clenzy-kafka:9092
      # Jasypt
      JASYPT_ENCRYPTOR_PASSWORD: ${JASYPT_ENCRYPTOR_PASSWORD}
      # Mail SMTP (envoi)
      MAIL_HOST: ${MAIL_HOST:-mail.clenzy.fr}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-info@clenzy.fr}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      # SSL/STARTTLS — Port 465: SSL=true STARTTLS=false / Port 587: SSL=false STARTTLS=true
      MAIL_SMTP_SSL_ENABLE: ${MAIL_SMTP_SSL_ENABLE:-false}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      MAIL_SMTP_STARTTLS_REQUIRED: ${MAIL_SMTP_STARTTLS_REQUIRED:-true}
      # Mail IMAP (réception)
      IMAP_HOST: ${IMAP_HOST:-mail.clenzy.fr}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USERNAME: ${IMAP_USERNAME:-info@clenzy.fr}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-${MAIL_PASSWORD:-}}
      IMAP_ENABLED: ${IMAP_ENABLED:-true}
      ALLOWED_ORIGINS: https://${APP_DOMAIN}
      SERVER_PORT: 8080
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      libreoffice:
        condition: service_healthy
    volumes:
      - contact-uploads-staging:/app/uploads/contact
      - document-templates-staging:/app/uploads/templates
      - document-generated-staging:/app/uploads/documents
    networks:
      clenzy-network-staging:
        aliases:
          - clenzy-server

  # Frontend React (PMS)
  pms-client:
    build:
      context: ../clenzy/client
      dockerfile: Dockerfile
    container_name: clenzy-client-staging
    restart: unless-stopped
    expose:
      - "80"
    networks:
      clenzy-network-staging:
        aliases:
          - clenzy-frontend

  # ==========================================
  # MONITORING
  # ==========================================

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: clenzy-prometheus-staging
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data-staging:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      pms-server:
        condition: service_started
    networks:
      - clenzy-network-staging

  grafana:
    image: grafana/grafana:10.4.0
    container_name: clenzy-grafana-staging
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${MONITORING_DOMAIN}
    volumes:
      - grafana-data-staging:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - clenzy-network-staging

volumes:
  postgres-data-staging:
  redis-data-staging:
  kafka-data-staging:
  certbot-webroot-staging:
  certbot-certs-staging:
  contact-uploads-staging:
  document-templates-staging:
  document-generated-staging:
  prometheus-data-staging:
  grafana-data-staging:

networks:
  clenzy-network-staging:
    driver: bridge
    name: clenzy-network-staging
