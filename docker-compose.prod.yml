# ===========================================
# Clenzy - Docker Compose PRODUCTION
# ===========================================
# Usage: docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Architecture avec reverse proxy Nginx :
#   - clenzy.fr         → Landing Page
#   - app.clenzy.fr     → PMS Frontend
#   - app.clenzy.fr/api → PMS Backend (Spring Boot)
#   - auth.clenzy.fr    → Keycloak
#   - monitoring.clenzy.fr  → Grafana
#   - prometheus.clenzy.fr  → Prometheus (basic auth)
#   - kafka.clenzy.fr       → Kafka UI (basic auth)

services:

  # ==========================================
  # REVERSE PROXY NGINX (Point d'entrée unique)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: clenzy-nginx-prod
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      APP_DOMAIN: ${APP_DOMAIN}
      AUTH_DOMAIN: ${AUTH_DOMAIN}
      MONITORING_DOMAIN: ${MONITORING_DOMAIN:-monitoring.clenzy.fr}
      PROMETHEUS_DOMAIN: ${PROMETHEUS_DOMAIN:-prometheus.clenzy.fr}
      KAFKA_UI_DOMAIN: ${KAFKA_UI_DOMAIN:-kafka.clenzy.fr}
      CERTBOT_CERT_NAME: ${CERTBOT_CERT_NAME:-${DOMAIN}}
      NGINX_ENVSUBST_FILTER: ^(DOMAIN|APP_DOMAIN|AUTH_DOMAIN|MONITORING_DOMAIN|PROMETHEUS_DOMAIN|KAFKA_UI_DOMAIN|CERTBOT_CERT_NAME)$
      NGINX_ENVSUBST_TEMPLATE_DIR: /etc/nginx/templates
      NGINX_ENVSUBST_TEMPLATE_SUFFIX: .template
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - landing
      - pms-client
      - pms-server
      - keycloak
      - grafana
      - kafka-ui
    networks:
      - clenzy-network

  # ==========================================
  # CERTBOT (Let's Encrypt SSL)
  # ==========================================
  certbot:
    image: certbot/certbot:latest
    container_name: clenzy-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Renouvellement automatique toutes les 12h
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - clenzy-network

  # ==========================================
  # LANDING PAGE (site vitrine)
  # ==========================================
  landing:
    image: ghcr.io/mazy06/clenzy-landing:latest
    build:
      context: ../clenzy-landingpage
      dockerfile: Dockerfile
      args:
        VITE_APP_URL: https://${APP_DOMAIN:-app.clenzy.fr}
        VITE_API_URL: https://${APP_DOMAIN:-app.clenzy.fr}
    container_name: clenzy-landing-prod
    restart: unless-stopped
    expose:
      - "80"
    networks:
      clenzy-network:
        aliases:
          - clenzy-landing

  # ==========================================
  # INFRASTRUCTURE (BDD, Cache, Auth)
  # ==========================================

  # Base de données PostgreSQL (Primary)
  postgres:
    image: postgres:15-alpine
    container_name: clenzy-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-${POSTGRES_PASSWORD}}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
      - ./postgres/sync-password.sh:/docker-entrypoint-initdb.d/00-sync-password.sh:ro
      - ./postgres/primary-init.sh:/docker-entrypoint-initdb.d/01-primary-init.sh:ro
      - ./postgres/postgresql-primary.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba_replication.conf:/etc/postgresql/pg_hba_replication.conf:ro
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba_replication.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clenzy-network

  # PostgreSQL Read Replica (Streaming Replication)
  # Niveau 8 — Scalabilite : replica en lecture seule pour router
  # les requetes @Transactional(readOnly=true) depuis Spring Boot.
  # Desactive par defaut — decommenter et configurer SPRING_DATASOURCE_REPLICA_URL
  # dans le pms-server pour activer.
  # postgres-replica:
  #   image: postgres:15-alpine
  #   container_name: clenzy-postgres-replica-prod
  #   restart: unless-stopped
  #   environment:
  #     PGUSER: replicator
  #     PGPASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-${POSTGRES_PASSWORD}}
  #   volumes:
  #     - postgres-replica-data-prod:/var/lib/postgresql/data
  #   command: >
  #     bash -c "
  #       if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
  #         echo 'Initializing replica from primary...'
  #         pg_basebackup -h postgres -p 5432 -U replicator -D /var/lib/postgresql/data -Fp -Xs -P -R
  #       fi
  #       exec postgres -c hot_standby=on -c max_connections=150
  #     "
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - clenzy-network

  # PgBouncer — Connection Pooling
  # Niveau 8 — Scalabilite : reduit les connexions directes a PostgreSQL
  # de ~50 (HikariCP) a ~25 (pool pgBouncer), avec support 200 clients.
  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p3
    container_name: clenzy-pgbouncer-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: /entrypoint.sh
    expose:
      - "6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clenzy-network

  # PostgreSQL Exporter — Metriques Prometheus
  # Niveau 8 — Scalabilite : connexions, requetes, replication lag, taille BDD
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: clenzy-postgres-exporter-prod
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    volumes:
      - ./postgres/postgres-exporter-queries.yml:/etc/postgres-exporter/queries.yml:ro
    command:
      - '--extend.query-path=/etc/postgres-exporter/queries.yml'
      - '--web.listen-address=:9187'
    expose:
      - "9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clenzy-network

  # Cache Redis
  redis:
    image: redis:7-alpine
    container_name: clenzy-redis-prod
    restart: unless-stopped
    volumes:
      - redis-data-prod:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clenzy-network

  # Serveur Keycloak (Identity Provider)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: clenzy-keycloak-prod
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB_NAME:-keycloak_prod}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: ${AUTH_DOMAIN}
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./keycloak/realm-clenzy.json:/opt/keycloak/data/import/realm-clenzy.json
    expose:
      - "8080"
    command: start --import-realm
    networks:
      clenzy-network:
        aliases:
          - clenzy-keycloak

  # ==========================================
  # MESSAGE BROKER (Kafka + KRaft)
  # ==========================================

  # Apache Kafka (mode KRaft — sans Zookeeper)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: clenzy-kafka-prod
    hostname: clenzy-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@clenzy-kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://clenzy-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 720
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # KRaft cluster id must be a valid base64 UUID-like token (22 chars).
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-CHANGE_ME_kafka_cluster_id}
    volumes:
      - kafka-data-prod:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - clenzy-network

  # Kafka UI (monitoring des topics)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: clenzy-kafka-ui-prod
    restart: unless-stopped
    environment:
      KAFKA_CLUSTERS_0_NAME: clenzy-prod
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: clenzy-kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - clenzy-network

  # ==========================================
  # LIBREOFFICE (Conversion ODT → PDF)
  # ==========================================

  # Gotenberg — LibreOffice headless pour conversion de documents (multi-arch amd64/arm64)
  # REST API : POST /forms/libreoffice/convert  (multipart files)
  # Health   : GET /health
  # Docs     : https://gotenberg.dev
  libreoffice:
    image: gotenberg/gotenberg:8
    container_name: clenzy-libreoffice-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      clenzy-network:
        aliases:
          - clenzy-libreoffice

  # ==========================================
  # PMS (Application métier)
  # ==========================================

  # Backend Spring Boot
  pms-server:
    image: ghcr.io/mazy06/clenzy-server:latest
    build:
      context: ../clenzy/server
      dockerfile: Dockerfile
    container_name: clenzy-server-prod
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_LIQUIBASE_ENABLED: "false"
      FRONTEND_URL: https://app.clenzy.fr
      STRIPE_CURRENCY: eur
      STRIPE_SUCCESS_URL: https://app.clenzy.fr/interventions/payment/success?session_id={CHECKOUT_SESSION_ID}
      STRIPE_CANCEL_URL: https://app.clenzy.fr/interventions/payment/cancel
      # DataSource Primary (via pgBouncer — prepareThreshold=0 requis en mode transaction)
      SPRING_DATASOURCE_URL: jdbc:postgresql://pgbouncer:6432/${POSTGRES_DB}?sslmode=prefer&prepareThreshold=0
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # DataSource Replica (pour @Transactional readOnly — fallback sur primary si non configure)
      SPRING_DATASOURCE_REPLICA_URL: ${SPRING_DATASOURCE_REPLICA_URL:-jdbc:postgresql://pgbouncer:6432/${POSTGRES_DB}?sslmode=prefer&prepareThreshold=0}
      SPRING_DATASOURCE_REPLICA_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_REPLICA_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: https://${AUTH_DOMAIN}/realms/clenzy
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://clenzy-keycloak:8080/realms/clenzy/protocol/openid-connect/certs
      KEYCLOAK_AUTH_SERVER_URL: http://clenzy-keycloak:8080
      KEYCLOAK_CLIENT_ID: clenzy-api
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_REALM: clenzy
      # Admin Keycloak (pour sync utilisateurs, reset password, etc.)
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      # Use the Compose service name by default (Docker DNS): `redis`.
      # Override via .env if needed.
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST:-redis}
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: clenzy-kafka:9092
      # Jasypt (chiffrement tokens Airbnb en base)
      JASYPT_ENCRYPTOR_PASSWORD: ${JASYPT_ENCRYPTOR_PASSWORD}
      # Airbnb Integration
      AIRBNB_CLIENT_ID: ${AIRBNB_CLIENT_ID:-}
      AIRBNB_CLIENT_SECRET: ${AIRBNB_CLIENT_SECRET:-}
      AIRBNB_REDIRECT_URI: https://${APP_DOMAIN}/api/airbnb/callback
      AIRBNB_WEBHOOK_SECRET: ${AIRBNB_WEBHOOK_SECRET:-}
      # Mail SMTP (envoi)
      MAIL_HOST: ${MAIL_HOST:-mail.clenzy.fr}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-info@clenzy.fr}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      # Mail IMAP (réception)
      IMAP_HOST: ${IMAP_HOST:-mail.clenzy.fr}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USERNAME: ${IMAP_USERNAME:-info@clenzy.fr}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-${MAIL_PASSWORD:-}}
      IMAP_ENABLED: ${IMAP_ENABLED:-true}
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://${APP_DOMAIN}}
      SERVER_PORT: 8080
    expose:
      - "8080"
    depends_on:
      pgbouncer:
        condition: service_healthy
      keycloak:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      libreoffice:
        condition: service_healthy
    volumes:
      - contact-uploads-prod:/app/uploads/contact
      - document-templates-prod:/app/uploads/templates
      - document-generated-prod:/app/uploads/documents
      - backups-prod:/app/backups
    networks:
      clenzy-network:
        aliases:
          - clenzy-server

  # Frontend React (PMS)
  pms-client:
    image: ghcr.io/mazy06/clenzy-client:latest
    build:
      context: ../clenzy/client
      dockerfile: Dockerfile
    container_name: clenzy-client-prod
    restart: unless-stopped
    expose:
      - "80"
    networks:
      clenzy-network:
        aliases:
          - clenzy-frontend

  # ==========================================
  # MONITORING (Prometheus + Grafana)
  # ==========================================

  # Prometheus - Collecte de métriques
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: clenzy-prometheus-prod
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data-prod:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    depends_on:
      pms-server:
        condition: service_started
      postgres-exporter:
        condition: service_started
    networks:
      - clenzy-network

  # Grafana - Dashboards de monitoring
  grafana:
    image: grafana/grafana:10.4.0
    container_name: clenzy-grafana-prod
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${MONITORING_DOMAIN:-monitoring.clenzy.fr}
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - grafana-data-prod:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - clenzy-network

  # Loki - Aggregation de logs
  loki:
    image: grafana/loki:2.9.17
    container_name: clenzy-loki-prod
    restart: unless-stopped
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data-prod:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      clenzy-network:
        aliases:
          - loki

  # k6 — Load Testing
  # Niveau 8 — Scalabilite : tests de charge pour valider la performance.
  # Usage : docker compose -f docker-compose.prod.yml run --rm k6 run /scripts/load-test.js
  k6:
    image: grafana/k6:0.49.0
    container_name: clenzy-k6-prod
    profiles:
      - loadtest
    volumes:
      - ./k6:/scripts:ro
      - ./k6/results:/scripts/results
    environment:
      BASE_URL: http://clenzy-server:8080
      AUTH_TOKEN: ${K6_AUTH_TOKEN:-}
    networks:
      - clenzy-network

  # Promtail - Collecte de logs vers Loki
  promtail:
    image: grafana/promtail:3.5.10
    container_name: clenzy-promtail-prod
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.44"
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - clenzy-network

volumes:
  postgres-data-prod:
  # postgres-replica-data-prod:  # Decommenter avec postgres-replica
  redis-data-prod:
  kafka-data-prod:
  certbot-webroot:
  certbot-certs:
  prometheus-data-prod:
  grafana-data-prod:
  loki-data-prod:
  contact-uploads-prod:
  document-templates-prod:
  document-generated-prod:
  backups-prod:

networks:
  clenzy-network:
    driver: bridge
    name: clenzy-network
