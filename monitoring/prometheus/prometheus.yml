# ===========================================
# Prometheus - Configuration Clenzy
# ===========================================
# Scrape les metriques Spring Boot Actuator + Keycloak

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Backend Spring Boot (Actuator + Micrometer)
  - job_name: 'clenzy-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['clenzy-server:8080']
        labels:
          app: 'clenzy'
          component: 'backend'

  # Keycloak metrics
  - job_name: 'keycloak'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['clenzy-keycloak:8080']
        labels:
          app: 'clenzy'
          component: 'keycloak'

  # PostgreSQL — Niveau 8 Scalabilite
  - job_name: 'postgres'
    scrape_interval: 15s
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          app: 'clenzy'
          component: 'postgres'

  # Redis (via redis-exporter si ajoute)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

