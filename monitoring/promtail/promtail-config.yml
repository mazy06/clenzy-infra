server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Collecte des logs de tous les conteneurs Docker
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        filters:
          - name: network
            values: ["clenzy-network"]
          - name: status
            values: ["running"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      # Drop targets without a service label (prevents "no unique labels" errors)
      - source_labels: ['service']
        regex: ''
        action: drop
    pipeline_stages:
      # Parser JSON uniquement pour les logs Spring Boot (pms-server)
      - match:
          selector: '{service="pms-server"}'
          stages:
            - json:
                expressions:
                  level: level
                  logger: logger_name
                  message: message
                  thread: thread_name
            - labels:
                level:
                logger:
