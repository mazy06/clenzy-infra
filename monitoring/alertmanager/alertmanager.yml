# ===========================================
# Clenzy — Alertmanager
# ===========================================
# Route toutes les alertes Prometheus vers l'endpoint ops de l'app
# (POST /api/ops/alerts/alertmanager) -> notification in-app pour le staff plateforme.
#
# Le token Bearer est lu depuis /etc/alertmanager/ops_token, ecrit par scripts/deploy.sh
# depuis ${CLENZY_OPS_ALERT_TOKEN} (jamais commite). Voir aussi OpsAlertController cote app.

route:
  receiver: 'clenzy-inapp'
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: 'clenzy-inapp'
    webhook_configs:
      - url: 'http://clenzy-server:8080/api/ops/alerts/alertmanager'
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials_file: /etc/alertmanager/ops_token
